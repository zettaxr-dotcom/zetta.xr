<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Zetta Web</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body id="top">

    <!-- CATEGORY -->

    <section class="section-box">

        <div class="category-buttons">

            <button
                class="active"
                data-target="top"
            >
                All
            </button>

            <button
                data-target="minecraft-section"
            >
                Minecraft
            </button>

            <button
                data-target="content-section"
            >
                Content
            </button>

            <button
                data-target="shop-section"
            >
                Shop
            </button>

        </div>

    </section>

    <!-- PROMOTION -->

    <section class="section-box">

        <div class="section-title">

            <h2>📢 Promosi</h2>

            <p>
                Promosi dan iklan pilihan terbaru.
            </p>

        </div>

        <div class="promo-slider">

            <a href="#" class="promo-card">
                <img src="promo1.jpg">
            </a>

            <a href="#" class="promo-card">
                <img src="promo2.jpg">
            </a>

            <a href="#" class="promo-card">
                <img src="promo3.jpg">
            </a>

            <a href="#" class="promo-card">
                <img src="promo4.jpg">
            </a>

            <a href="#" class="promo-card">
                <img src="promo5.jpg">
            </a>

        </div>

    </section>

    <!-- MINECRAFT -->

    <section
        class="section-box"
        id="minecraft-section"
    >

        <div class="section-title">

            <h2>⛏ Minecraft</h2>

            <p>
                Minecraft content pilihan terbaik.
            </p>

        </div>

        <div class="minecraft-grid">

            <a href="#" class="minecraft-card">

                <img src="mod.jpg">

                <h3>Mod</h3>

            </a>

            <a href="#" class="minecraft-card">

                <img src="shader.jpg">

                <h3>Shader</h3>

            </a>

            <a href="#" class="minecraft-card">

                <img src="texture.jpg">

                <h3>Texture</h3>

            </a>

        </div>

    </section>

    <!-- CONTENT -->

    <section
        class="section-box"
        id="content-section"
    >

        <div class="section-title">

            <h2>🎬 Content</h2>

            <p>
                Konten terbaru dari creator.
            </p>

        </div>

        <div class="content-slider">

            <a href="#" class="content-card">

                <img src="content1.jpg">

                <h3>None</h3>

            </a>

            <a href="#" class="content-card">

                <img src="content2.jpg">

                <h3>None</h3>

            </a>

            <a href="#" class="content-card">

                <img src="content3.jpg">

                <h3>None</h3>

            </a>

            <a href="#" class="content-card">

                <img src="content4.jpg">

                <h3>None</h3>

            </a>

            <a href="#" class="content-card">

                <img src="content5.jpg">

                <h3>None</h3>

            </a>

        </div>

    </section>

    <!-- SHOP -->

    <section
        class="section-box"
        id="shop-section"
    >

        <div class="section-title">

            <h2>🛒 Shop</h2>

            <p>
                Pilihan item dan layanan terbaik.
            </p>

        </div>

        <div class="shop-grid">

            <a href="shop1.html" class="shop-card">
                <img src="shop1.jpg">
            </a>

            <a href="shop2.html" class="shop-card">
                <img src="shop2.jpg">
            </a>

            <a href="shop3.html" class="shop-card">
                <img src="shop3.jpg">
            </a>

            <a href="shop4.html" class="shop-card">

            </a>

            <a href="shop7.html" class="shop-card">

            </a>

            <a href="shop8.html" class="shop-card">
                <img src="shop8.jpg">
            </a>

            <a href="shop9.html" class="shop-card">
                <img src="shop9.jpg">
            </a>

            <a href="shop10.html" class="shop-card">
                <img src="shop10.jpg">
            </a>

            <a href="shop11.html" class="shop-card">
                <img src="shop11.jpg">
            </a>

            <a href="shop12.html" class="shop-card">
                <img src="shop12.jpg">
